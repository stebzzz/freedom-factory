# /etc/nginx/sites-available/freedom-factory.conf
# Reverse proxy for the Freedom Factory Next.js app running on 127.0.0.1:3000.
#
# Drop into /etc/nginx/sites-available/, then:
#   sudo ln -sf /etc/nginx/sites-available/freedom-factory.conf \
#               /etc/nginx/sites-enabled/freedom-factory.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS is provided by certbot — see DEPLOY.md.

# Upstream lets us add keepalive and tweak per-upstream timeouts later.
upstream freedom_factory {
  server 127.0.0.1:3000;
  keepalive 32;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
  listen 80;
  listen [::]:80;
  server_name REPLACE_WITH_YOUR_DOMAIN;

  # ACME challenge served as plain HTTP by certbot
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS app server ────────────────────────────────────────────────────
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name REPLACE_WITH_YOUR_DOMAIN;

  # Certbot will populate these.
  ssl_certificate     /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/REPLACE_WITH_YOUR_DOMAIN/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Long-running renders + large uploads (style-kit PDFs, video refs).
  client_max_body_size 2G;
  proxy_read_timeout 1200s;
  proxy_send_timeout 1200s;
  proxy_connect_timeout 60s;

  # Stream Server-Sent Events from /api/pipeline-status etc.
  proxy_buffering off;
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  # Forward client info to the app.
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;

  # Cache Next.js immutable assets aggressively.
  location /_next/static/ {
    proxy_pass http://freedom_factory;
    proxy_cache_valid 200 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Generated videos / images — served as static files via Next.
  location /generated/ {
    proxy_pass http://freedom_factory;
    proxy_buffering on;
    proxy_cache_valid 200 1h;
  }

  # Everything else → Next.js app.
  location / {
    proxy_pass http://freedom_factory;
  }

  # Block sensitive paths just in case.
  location ~* /\.env { return 403; }
  location ~* /\.git { return 403; }
}
